<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Resume Analyzer 🤖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🤖 AI Resume Analyzer</h1>

  <input type="text" id="jobRole" placeholder="Enter target job (e.g. Frontend Developer)">

  <textarea id="resumeInput" placeholder="Paste your resume here..."></textarea>

  <button onclick="analyzeResume()">Analyze Resume</button>

  <div class="results">
    <h2>📊 Analysis</h2>
    <p id="type"></p>
    <p id="score"></p>
    <p id="match"></p>
    <p id="suggestions"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
